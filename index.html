<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Verse Practice</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background-color: #1f2937; color: #e5e7eb; } /* Dark mode background/text */
  .blank { border-bottom: 2px solid gray; padding: 0 4px; min-width: 20px; display: inline-block; }
  .correct { border-color: #10b981; color: #10b981; } /* green */
  .wrong { border-color: #ef4444; color: #ef4444; }    /* red */
  .current { background-color: #374151; padding: 2px 4px; border-radius: 2px; }
</style>
</head>
<body class="flex flex-col items-center p-10 font-sans">

<div class="w-full max-w-4xl bg-gray-800 p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4 text-white">Verse Practice</h1>

  <div class="mb-4">
    <input id="verse-input" type="text" placeholder="Zadej odkaz (např. 'Zj 1:1', 'Zj 1', 'Zj 1:3-7')" class="w-full border p-2 rounded text-lg text-black"/>
    <button id="load-verse" class="bg-blue-500 text-white px-4 py-2 rounded mt-2 hover:bg-blue-600">Načíst</button>
  </div>

  <div class="mb-4" id="file-container">
    <input type="file" id="bible-file" accept=".json"/>
    <div id="status" class="text-sm text-gray-400 mt-1"></div>
  </div>

  <div class="mb-4">
    <select id="difficulty" class="border px-2 py-1 rounded text-black">
      <option value="1">Easy</option>
      <option value="2" selected>Medium</option>
      <option value="3">Hard</option>
      <option value="4">Very Hard</option>
      <option value="5">Extreme</option>
    </select>
    <button id="restart" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 ml-2">Restart</button>
  </div>

  <div id="verse-container" class="mb-4 text-xl"></div>
  <input id="input" type="text" placeholder="Type here..." class="w-full border p-2 rounded text-lg text-black"/>
</div>

<script>
let bible = {};
let words = [];
let blanks = [];
let typed = [];
let currentIdx = 0;
let difficulty = 2;

// -------------------- Load Bible --------------------
function loadBibleFromLocalStorage() {
  if(localStorage.getItem("bibleJSON")){
    try{
      bible = JSON.parse(localStorage.getItem("bibleJSON"));
      document.getElementById("status").innerText = "Bible loaded from localStorage ✅";
      document.getElementById("file-container").style.display = "none";
    } catch(e){
      console.error("Failed to parse Bible JSON from localStorage", e);
    }
  }
}

document.getElementById("bible-file").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      bible = JSON.parse(evt.target.result);
      localStorage.setItem("bibleJSON", JSON.stringify(bible));
      document.getElementById("status").innerText = "Bible loaded from file and saved to localStorage ✅";
      document.getElementById("file-container").style.display = "none";
      console.log("Bible loaded:", bible);
    } catch(err){
      console.error("Failed to parse Bible JSON:", err);
      document.getElementById("status").innerText = "Error loading Bible JSON ❌";
    }
  };
  reader.readAsText(file, "utf-8");
});

// -------------------- Verse selection --------------------
function parseReference(ref){
  const match = ref.match(/^(\w+)\s+(\d+)(?::(\d+)(?:-(\d+)(?::(\d+))?)?)?$/);
  if(!match) { alert("Špatný formát"); return null; }
  const book = match[1];
  const ch1 = parseInt(match[2]);
  const v1 = match[3] ? parseInt(match[3]) : null;
  const v2 = match[4] ? parseInt(match[4]) : null;

  let verses = [];
  if(!v1){
    for(let i=0;i<bible[book]["chapters"][ch1-1].length;i++) verses.push(bible[book]["chapters"][ch1-1][i]);
  } else if(v1 && !v2){
    verses.push(bible[book]["chapters"][ch1-1][v1-1]);
  } else if(v1 && v2){
    for(let i=v1-1;i<v2;i++) verses.push(bible[book]["chapters"][ch1-1][i]);
  }
  return verses;
}

// -------------------- Fill-in-the-blanks logic --------------------
function initBlanks(verseArray){
  words = [];
  blanks = [];
  typed = [];
  verseArray.forEach(v => {
    const w = v.split(" ");
    const hide_ratio = {1:0.2,2:0.4,3:0.6,4:0.8,5:1.0}[difficulty];
    const num_to_hide = Math.floor(w.length * hide_ratio);
    const indices = new Set();
    while(indices.size < num_to_hide) indices.add(Math.floor(Math.random()*w.length));

    w.forEach((word,i)=>{
      words.push(word);
      blanks.push(indices.has(i));
      typed.push("");
    });
    words.push(" "); // add space between verses
    blanks.push(false);
    typed.push("");
  });
  currentIdx = blanks.findIndex(b=>b);
  render();
}

function render(){
  const container = document.getElementById("verse-container");
  container.innerHTML = words.map((w,i)=>{
    if(blanks[i]){
      let cls = "";
      if(typed[i]) cls = typed[i]===w?"correct":"wrong";
      if(i===currentIdx) cls+=" current";
      let display = typed[i]||"_".repeat(Math.max(1,w.length));
      return `<span class="blank ${cls}" data-index="${i}">${display}</span>`;
    } else {
      if(w===" ") return "<br/>";
      return `<span class="mx-1">${w}</span>`;
    }
  }).join(" ");
  document.getElementById("input").focus();
}

function moveToNextBlank(){
  if(currentIdx<0) return;
  currentIdx = blanks.findIndex((b,i)=>b && i>currentIdx);
}

// -------------------- Event listeners --------------------
document.getElementById("input").addEventListener("input", e=>{
  if(currentIdx<0) return;
  let val = e.target.value;
  typed[currentIdx] = val;
  render();
});

document.getElementById("input").addEventListener("keydown", e=>{
  if(e.key===" "){
    typed[currentIdx] = e.target.value.trim();
    moveToNextBlank();
    e.target.value = "";
    render();
  }
  if(e.key==="Enter"){
    moveToNextBlank();
    e.target.value = "";
    render();
  }
});

document.getElementById("restart").addEventListener("click", ()=>initBlanks(words.filter((_,i)=>blanks[i])));
document.getElementById("difficulty").addEventListener("change", e=>{
  difficulty = parseInt(e.target.value);
});

document.getElementById("load-verse").addEventListener("click", ()=>{
  const ref = document.getElementById("verse-input").value.trim();
  if(!bible || Object.keys(bible).length===0){
    alert("Bible není načtena. Vyber soubor JSON výše.");
    return;
  }
  const verses = parseReference(ref);
  if(verses && verses.length>0) initBlanks(verses);
});

// -------------------- Initialize --------------------
loadBibleFromLocalStorage();
</script>
</body>
</html>
