<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verse / Text Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center p-6 font-sans">

<!-- Top menu -->
<div id="app-menu" class="w-full max-w-4xl">
    <button data-app="daily" class="px-4 py-2 rounded">📅 Daily</button>
    <button data-app="byheart" class="px-4 py-2 rounded">ByHeart</button>
    <button data-app="palace" class="px-4 py-2 rounded">🏛️ Palace</button>
    <button id="open-drill-mode" class="px-4 py-2 rounded ml-auto bg-yellow-400 text-black hover:bg-yellow-500">Drill</button>
</div>

<!-- Main container -->
<div id="daily-container" class="w-full max-w-4xl bg-gray-800 p-6 rounded shadow space-y-4" style="display:none;">
    <div id="daily-content"></div>
</div>

<div id="byheart-container" class="w-full max-w-4xl bg-gray-800 p-6 rounded shadow space-y-4">

    <!-- Verse input -->
    <div>
        <input id="verse-input" type="text" placeholder="Zadej odkaz (Zj 1:1, Zj 1:3-7)" class="w-full border p-2 rounded text-lg text-black"/>
        <button id="load-verse" class="bg-blue-500 text-white px-4 py-2 rounded mt-2 hover:bg-blue-600">Načíst verš</button>
    </div>

    <!-- Bible file upload (hidden until needed) -->
    <div id="file-container" class="hidden">
        <input type="file" id="bible-file" accept=".json"/>
        <div id="status" class="text-sm text-gray-400 mt-1"></div>
    </div>

    <!-- Custom texts (collapsible) -->
    <div class="bg-gray-700 p-4 rounded">
        <button id="toggle-texts" class="bg-gray-600 w-full text-white py-2 rounded mb-2">📂 Moje texty (otevřít / zavřít)</button>
        <div id="custom-section" class="hidden space-y-2">
            <input id="custom-title" type="text" placeholder="Název textu" class="w-full border p-2 rounded text-black"/>
            <textarea id="custom-text" rows="4" placeholder="Sem napiš svůj text (podporuje více řádků)..." class="w-full border p-2 rounded text-black"></textarea>
            <div class="flex gap-2">
                <button id="save-text" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Uložit text</button>
                <button id="clear-edit" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-500">Zrušit edit</button>
            </div>
            <div id="saved-texts" class="mt-2 space-y-1"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap gap-2 items-center">
        <select id="difficulty" class="border px-2 py-1 rounded text-black">
            <option value="0">Show All</option>
            <option value="1">Easy</option>
            <option value="2" selected>Medium</option>
            <option value="3">Hard</option>
            <option value="4">Very Hard</option>
            <option value="5">Extreme</option>
        </select>
        <button id="restart" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Restart</button>

        <label class="flex items-center gap-1 text-sm ml-2">
            <input type="checkbox" id="toggle-input" checked />
            Input mode
        </label>

        <label class="flex items-center gap-1 text-sm ml-2">
            <input type="checkbox" id="toggle-audio" />
            Audio mode
        </label>
    </div>

    <!-- Verse/Text display -->
    <div id="verse-container" class="text-2xl leading-relaxed whitespace-pre-wrap pb-24"></div>
</div>

<!-- Memory Palace Container -->
<div id="palace-container" style="display:none;padding-bottom:60px;">
    <div id="palace-content"></div>
</div>

<!-- Sticky input + controls -->
<div id="sticky-controls" class="fixed bottom-4 left-0 w-full bg-gray-800 p-3 flex items-center gap-2">
    <input id="input" type="text" placeholder="Type here..."
           class="flex-grow border p-2 rounded text-lg text-black"/>
    <button id="reveal" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 text-lg flex-shrink-0">Reveal</button>
</div>
<div id="audio-controls" class="fixed bottom-4 left-0 w-full bg-gray-800 p-3 flex gap-2 hidden">
    <button id="play-audio" class="bg-green-500 text-white rounded text-2xl flex-1 hover:bg-green-600 py-4">▶️ Play</button>
    <button id="repeat-audio" class="bg-blue-500 text-white rounded text-2xl flex-1 hover:bg-blue-600 py-4">🔁 Repeat</button>
</div>

<!-- Drill modal (inserted here so it doesn't affect normal flow) -->
<!-- Drill mode UI: START -->
<div id="drill-modal-overlay" class="drill-hidden" aria-hidden="true">
    <div id="drill-modal" role="dialog" aria-modal="true" aria-label="Drill mode">
        <div class="drill-header">
            <h3>Drill Mode — write full verse</h3>
            <button id="close-drill-mode" title="Close">✖</button>
        </div>

        <div class="drill-controls">
            <input id="drill-verse-input" type="text" placeholder="Reference (e.g. Zj 1:1 or Zj 1:3-7). Leave empty to use loaded verse" />
            <button id="drill-load-btn">Load</button>
        </div>

        <div id="drill-current-info" class="drill-current-info" aria-live="polite">
            <div id="drill-progress" class="drill-progress">— / —</div>
        </div>

        <textarea id="drill-typing-input" rows="6" placeholder="Type the full verse(s) here..." spellcheck="false"></textarea>

        <div class="drill-actions">
            <button id="drill-check-btn" class="btn-check">Check</button>
            <button id="drill-retry-btn" disabled>Retry</button>
            <button id="drill-prev-btn" disabled>Prev</button>
            <button id="drill-next-btn" disabled>Next</button>
            <label class="drill-options"><input id="drill-ignore-punct" type="checkbox" /> Ignore punctuation</label>
        </div>

        <div id="drill-result" class="drill-result" aria-live="polite"></div>
        <div id="drill-right-form" class="drill-right-form drill-hidden" aria-live="polite"></div>
        <div id="drill-stats" class="drill-stats drill-hidden">
            <span id="drill-accuracy"></span>
            <span id="drill-errors"></span>
            <span id="drill-distance"></span>
        </div>
    </div>
</div>
<!-- Drill mode UI: END -->

<script src="script.js"></script>
<script src="memoryPalace.js"></script>
<script src="dailyRoutine.js"></script>
</body>
</html>
